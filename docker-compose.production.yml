# ============================================
# RENTILY PRODUCTION DOCKER ORCHESTRATION
# ============================================

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Database Layer (PostgreSQL 16)
  # ─────────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rentily_db_prod
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentily_admin -d rentily_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - rentily_network

  # ─────────────────────────────────────────────────────────────────────────────
  # Connection Pooling (PgBouncer)
  # ─────────────────────────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.21.0
    container_name: rentily_pgbouncer_prod
    restart: unless-stopped
    env_file: .env.production
    environment:
      - DATABASE_URL=postgresql://rentily_admin:${DB_PASSWORD}@db:5432/rentily_production
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6543"]
      interval: 10s
    networks:
      - rentily_network

  # ─────────────────────────────────────────────────────────────────────────────
  # Cache & Broker (Redis 7)
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rentily_redis_prod
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - rentily_network

  # ─────────────────────────────────────────────────────────────────────────────
  # Application Server (Django + Gunicorn)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: rentily_backend_prod
    restart: unless-stopped
    env_file: .env.production
    environment:
      - DATABASE_URL=postgresql://rentily_admin:${DB_PASSWORD}@pgbouncer:6543/rentily_production
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rentily_network

  # ─────────────────────────────────────────────────────────────────────────────
  # Async Workers (Celery)
  # ─────────────────────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: rentily_worker_prod
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=4
    env_file: .env.production
    environment:
      - DATABASE_URL=postgresql://rentily_admin:${DB_PASSWORD}@pgbouncer:6543/rentily_production
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rentily_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: rentily_beat_prod
    restart: unless-stopped
    command: celery -A config beat -l info
    env_file: .env.production
    environment:
      - DATABASE_URL=postgresql://rentily_admin:${DB_PASSWORD}@pgbouncer:6543/rentily_production
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rentily_network

  # ─────────────────────────────────────────────────────────────────────────────
  # Ingress Layer (Nginx)
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rentily_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - static_volume:/var/www/rentily/static:ro
      - media_volume:/var/www/rentily/media:ro
    depends_on:
      - backend
    networks:
      - rentily_network

networks:
  rentily_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
