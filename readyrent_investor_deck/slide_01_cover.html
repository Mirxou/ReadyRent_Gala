<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadyRent - الشريحة 1</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap');
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
    }
    .slide-content {
      width: 960px;
      height: 540px;
      position: relative;
      transform-origin: center center;
    }
    </style>
    <script>
    function scaleSlide() {
      const slide = document.querySelector('.slide-content');
      if (!slide) return;
      const slideWidth = 960;
      const slideHeight = 540;
      const scaleX = window.innerWidth / slideWidth;
      const scaleY = window.innerHeight / slideHeight;
      const scale = Math.min(scaleX, scaleY);
      slide.style.width = slideWidth + 'px';
      slide.style.height = slideHeight + 'px';
      slide.style.transform = `scale(${scale})`;
      slide.style.transformOrigin = 'center center';
      slide.style.flexShrink = '0';
    }
    window.addEventListener('load', scaleSlide);
    window.addEventListener('resize', scaleSlide);
    </script>
</head>
<body style="background:#0a0a0a;">
    <div class="slide-content" style="background:#0a0a0a; color:#ffffff;">
        <!-- Background Pattern -->
        <svg style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; opacity:0.1;">
            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#D4AF37" stroke-width="0.5"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" />
        </svg>

        <!-- Golden Accent Line -->
        <svg style="position:absolute; top:200px; right:60px;" width="120" height="4">
            <rect width="120" height="4" rx="2" fill="#D4AF37"/>
        </svg>

        <!-- Main Title -->
        <h1 style="position:absolute; right:60px; top:230px; font-size:62px; font-weight:700; color:#ffffff; margin:0; line-height:1.1;">
            READYRENT: المنظومة<br>
            <span style="color:#D4AF37;">السيادية للإيجار</span>
        </h1>

        <!-- Subtitle -->
        <p style="position:absolute; right:60px; top:380px; font-size:22px; font-weight:400; color:#d4d4d4; margin:0; width:700px; line-height:1.5;">
            لضمان الثقة، النزاهة، والتسوية الفورية<br>
            في اقتصاد الأصول ذات القيمة العالية في الجزائر.
        </p>

        <!-- Footer Decoration -->
        <svg style="position:absolute; bottom:40px; right:60px;" width="840" height="1">
            <rect width="840" height="1" fill="#D4AF37" opacity="0.3"/>
        </svg>
        
        <p style="position:absolute; right:60px; bottom:20px; font-size:12px; font-weight:600; letter-spacing:2px; color:#D4AF37; margin:0;">
            تقرير إحاطة المستثمرين — النسخة النهائية Q1 2026
        </p>

        <!-- Decorative Circle -->
        <svg style="position:absolute; left:-100px; top:-100px; opacity:0.3;" width="400" height="400">
            <circle cx="200" cy="200" r="180" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.4"/>
            <circle cx="200" cy="200" r="140" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.2"/>
        </svg>
    </div>
</body>
</html>
