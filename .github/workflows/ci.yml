name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Backend Tests (SQLite, no external services required)
  # ─────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: config.test_settings
          SECRET_KEY: test-secret-key-for-ci-only-not-used-in-prod
          JWT_SIGNING_KEY: test-jwt-signing-key-for-ci-only-different-from-secret
          QR_SIGNING_KEY: test-qr-signing-key-for-ci
          PII_HASH_KEY: test-pii-hash-key-for-ci
          IP_HASH_KEY: test-ip-hash-key-for-ci
          PII_ENCRYPTION_KEY_V1: Lf9-nDW20eI5Br59Fw7FE79krO54UCEraMVMzaBByxo=
          DATABASE_URL: sqlite:///test_db.sqlite3
        run: |
          pytest \
            --cov=apps \
            --cov=core \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --ignore=venv \
            --ignore=mutants \
            -x \
            --tb=short

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          if-no-files-found: ignore

      - name: Check code formatting (fatal errors only)
        working-directory: ./backend
        run: |
          pip install black flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,.venv,mutants,node_modules,migrations,__pycache__

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Frontend Tests & Build
  # ─────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter (non-fatal)
        working-directory: ./frontend
        run: npm run lint || true

      - name: Run type check (non-fatal)
        working-directory: ./frontend
        run: npm run type-check || true

      - name: Run unit tests
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: |
          npm run test:coverage -- \
            --watchAll=false \
            --passWithNoTests \
            --coverageThreshold="{}" \
            --forceExit

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Upload frontend coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-html
          path: frontend/coverage/
          if-no-files-found: ignore

      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NODE_ENV: production
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (non-fatal in CI)
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run test:e2e || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Security Scan (standalone)
  # ─────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install safety bandit

      - name: Run Safety check (non-fatal)
        working-directory: ./backend
        run: |
          python -m safety check --file requirements.txt || true

      - name: Run Bandit security scan
        working-directory: ./backend
        run: |
          python -m bandit -r apps/ -f json -o bandit-report.json || true
          python -m bandit -r apps/ -f txt --severity-level medium || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: backend/bandit-report.json
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Docker Build Validation
  # ─────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: readyrent-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: readyrent-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # JOB 5: Deploy to Staging (develop branch only)
  # ─────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, docker-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.readyrent.gala

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to Staging
        env:
          STAGING_SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
          STAGING_SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "Deploying backend to staging..."
          mkdir -p ~/.ssh
          echo "$STAGING_SSH_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh -i ~/.ssh/staging_key \
            -o StrictHostKeyChecking=no \
            $STAGING_SERVER_USER@$STAGING_SERVER_HOST \
            "bash /var/www/readyrent-staging/backend/scripts/deploy.sh staging"
          echo "Backend deployment completed"

      - name: Deploy Frontend to Staging
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Deploying frontend to staging..."
          npm install -g vercel
          cd frontend
          vercel --token=$VERCEL_TOKEN
          echo "Frontend deployment completed"

      - name: Run Post-Deploy Health Checks
        run: |
          echo "Running health checks..."
          sleep 30
          curl -f https://staging-backend.readyrent.gala/api/health/ || echo "Backend health check failed (non-fatal)"
          curl -f https://staging.readyrent.gala/ || echo "Frontend health check failed (non-fatal)"
          echo "Health checks done"

  # ─────────────────────────────────────────────────────────────────
  # JOB 6: Deploy to Production (main branch only)
  # ─────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, docker-build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://readyrent.gala

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to Production
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          echo "Deploying backend to production..."
          mkdir -p ~/.ssh
          echo "$PROD_SSH_KEY" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh -i ~/.ssh/prod_key \
            -o StrictHostKeyChecking=no \
            $PROD_SERVER_USER@$PROD_SERVER_HOST \
            "bash /var/www/ReadyRent_Gala/backend/scripts/deploy.sh production"
          echo "Backend deployment completed"

      - name: Deploy Frontend to Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Deploying frontend to production..."
          npm install -g vercel
          cd frontend
          vercel --prod --token=$VERCEL_TOKEN
          echo "Frontend deployment completed"

      - name: Run Post-Deploy Health Checks
        run: |
          echo "Running health checks..."
          sleep 30
          curl -f https://api.readyrent.gala/api/health/ || echo "Backend health check failed (non-fatal)"
          curl -f https://readyrent.gala/ || echo "Frontend health check failed (non-fatal)"
          echo "Health checks done"

      - name: Create Deployment Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" -m "Production deployment"
          git push origin --tags || true
