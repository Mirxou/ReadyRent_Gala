name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

jobs:
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Run Safety check (non-fatal — review report manually)
        working-directory: ./backend
        run: |
          safety check --file requirements.txt || true

      - name: Run Bandit security scan
        working-directory: ./backend
        run: |
          bandit -r apps/ config/ core/ -f json -o bandit-report.json || true
          bandit -r apps/ config/ core/ -f txt --severity-level medium || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: backend/bandit-report.json
          if-no-files-found: ignore

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run npm audit (non-fatal)
        working-directory: ./frontend
        run: |
          npm audit --audit-level=critical || true

      - name: Run Snyk security scan (non-fatal)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        working-directory: ./frontend
