[phases.setup]
nixPkgs = ["python311", "postgresql", "gcc"]

[phases.build]
cmds = ["cd backend && python -m venv /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt", "cd backend && python manage.py collectstatic --noinput"]

[phases.start]
cmd = "cd backend && gunicorn config.wsgi:application"

[envs]
PYTHON_VERSION = "3.11"
PYTHONPATH = "/app/backend"
