name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sovereign
          POSTGRES_USER: sovereign
          POSTGRES_PASSWORD: sovereign_secure_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sovereign"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://sovereign:sovereign_secure_password@localhost:5432/sovereign
      DJANGO_SETTINGS_MODULE: config.settings
      PYTHONUNBUFFERED: 1
      SECRET_KEY: "ci-secret-key-for-testing-only" 
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U sovereign; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run Migrations
        run: |
          python manage.py migrate

      - name: Check for model drift (Migration Guard)
        run: |
          python manage.py makemigrations --check --dry-run
        continue-on-error: false

      - name: Enforce no direct state writes (Grep Guard)
        run: |
          # Exclude migration files and specific engine files where writes are allowed (if any, usually strictly internal)
          # We search for "state =" or "escrow_status =" assignments in apps/payments/
          # Ideally, only engine.py should write to state, and only inside transition method.
          
          if grep -r "state =" apps/payments/ | grep -v "engine.py" | grep -v "migrations" | grep -v "tests" | grep -v "factories.py"; then
             echo "❌ CRITICAL: Direct state write detected outside Engine!"
             # grep output will show the lines.
             exit 1
          fi
          
          if grep -r "escrow_status =" apps/payments/ | grep -v "migrations" | grep -v "tests" | grep -v "factories.py"; then
             echo "❌ CRITICAL: Direct escrow_status write detected!"
             exit 1
          fi
          
          echo "✅ Architecture Guard Passed: No direct state writes found."

      - name: Run Tests (Pytest + Hypothesis)
        run: |
          pytest -q
