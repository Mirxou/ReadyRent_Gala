[phases.setup]
nixPkgs = ["python311", "postgresql", "gcc"]

[phases.build]
cmds = ["python -m venv /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt", "python manage.py collectstatic --noinput"]

[phases.start]
procfile = "web: python manage.py migrate && gunicorn config.wsgi:application"

[envs]
PYTHON_VERSION = "3.11"
