server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Redirect HTTP to HTTPS
    # return 301 https://$host$request_uri;

    location = /favicon.ico { access_log off; log_not_found off; }
    
    # Static Files (Collected via collectstatic)
    location /static/ {
        root /home/sovereign/ReadyRent_Gala/backend/staticfiles;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Media Files (Uploads)
    location /media/ {
        root /home/sovereign/ReadyRent_Gala/backend/media;
        expires 7d;
    }

    # Backend API (Gunicorn Proxy)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for AI endpoints
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
