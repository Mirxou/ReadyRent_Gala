services:
  postgres:
    image: postgres:16
    container_name: sovereign_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sovereign
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: sovereign_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sovereign -d sovereign" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
