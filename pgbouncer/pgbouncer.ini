;; ============================================
;; RENTILY PgBouncer Production Configuration
;; ============================================

[databases]
; Format: dbname = host=HOST port=PORT dbname=DBNAME
rentily_production = host=db port=5432 dbname=rentily_production user=rentily_admin

[pgbouncer]
; ============================================
; NETWORK
; ============================================
listen_addr = 0.0.0.0
listen_port = 6543

; ============================================
; AUTHENTICATION
; ============================================
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; ============================================
; POOLING MODE
; ============================================
; transaction: Best for web applications (recommended)
; session: One connection per client session
; statement: Most aggressive (experimental)
pool_mode = transaction

; ============================================
; CONNECTION LIMITS
; ============================================
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 3

; ============================================
; TIMEOUTS
; ============================================
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15
query_timeout = 0
query_wait_timeout = 120
client_idle_timeout = 0
idle_transaction_timeout = 0

; ============================================
; LOGGING
; ============================================
admin_users = rentily_admin
stats_users = stats, rentily_admin
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
syslog = 0
syslog_ident = pgbouncer
verbose = 0

; ============================================
; ADVANCED
; ============================================
; Disable if using prepared statements
server_reset_query = DISCARD ALL
server_reset_query_always = 0
server_check_delay = 30
server_check_query = select 1
server_fast_close = 0

; DNS lookups
dns_max_ttl = 15
dns_zone_check_period = 0

; ============================================
; CONSOLE ACCESS
; ============================================
; Access via: psql -p 6543 -U rentily_admin pgbouncer
